<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://lh3.googleusercontent.com; connect-src 'self' https://firebase.googleapis.com wss://*.firebaseio.com;" />

    <!-- Google Analytics 4 — VoteSmart AI -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VOTESMARTAI1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VOTESMARTAI1', {
        page_title: 'VoteSmart AI',
        send_page_view: true
      });
      // Custom event helper
      window.trackEvent = function(category, action, label) {
        gtag('event', action, { event_category: category, event_label: label });
      };
    </script>

    <!-- LCP image preload -->
    <link
      rel="preload"
      as="image"
      fetchpriority="high"

    />

    <!-- Fonts: preload style then load async to avoid render-blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=optional" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=optional" rel="stylesheet" /></noscript>

    <!-- Inline Critical CSS — eliminates FOUC, reserves layout for LCP, prevents CLS -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; scrollbar-gutter: stable; -webkit-text-size-adjust: 100%; }
      body { background-color: #fdf8f3; font-family: 'Inter', system-ui, sans-serif; color: #1f2937; line-height: 1.7; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
      #root { display: flex; flex-direction: column; min-height: 100vh; }
      /* Skeleton loader — shown until React hydrates and removes it */
      .initial-loader { display: flex; justify-content: center; align-items: center; height: 100vh; background: #fdf8f3; }
      .spinner { width: 40px; height: 40px; border: 4px solid #e8e3dd; border-top: 4px solid #8b5e34; border-radius: 50%; animation: spin 0.7s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* LCP image — reserve space to prevent CLS */
      .lcp-img { display: block; width: 180px; height: 64px; object-fit: contain; }
      img { display: block; }
    </style>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗳️</text></svg>" />
  </head>
  <body>
    <div id="root">
      <div class="initial-loader"><div class="spinner"></div></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
